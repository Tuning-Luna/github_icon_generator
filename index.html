<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0" />
    <title>Identicon Generator</title>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap"
      rel="stylesheet" />
    <link
      rel="stylesheet"
      href="style.css" />
  </head>
  <body>
    <div class="bg-grid"></div>

    <main class="wrap">
      <header class="header">
        <span class="badge">SHA-256</span>
        <h1 class="title">Identicon<br /><em>Generator</em></h1>
        <p class="sub">输入任意字符串，生成唯一像素图标</p>
      </header>

      <section class="canvas-section">
        <div class="canvas-wrap">
          <canvas
            id="cv"
            width="250"
            height="250"></canvas>
        </div>
        <p
          class="name-label"
          id="nameLabel">
          —
        </p>
      </section>

      <section class="controls">
        <div class="input-row">
          <input
            type="text"
            id="nameInput"
            placeholder="repo name / username / anything…"
            autocomplete="off"
            spellcheck="false" />
          <button
            class="btn btn-generate"
            id="btnGenerate">
            Generate
          </button>
        </div>

        <div class="btn-row">
          <button
            class="btn btn-random"
            id="btnRandom">
            ⚄ Random
          </button>
          <button
            class="btn btn-dl"
            id="btnDownload">
            ↓ Download
          </button>
        </div>
      </section>
    </main>

    <script src="index.js"></script>
  </body>
</html>
